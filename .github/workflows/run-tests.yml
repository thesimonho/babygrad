name: Run Tests
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  verify:
    name: Verify Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv (and Python)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Run lint
        run: uv run ruff check babygrad tests
      - name: Run typecheck
        run: uv run pyright
      - name: Run tests
        run: uv run pytest
