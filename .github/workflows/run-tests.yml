name: Run Tests
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  verify:
    name: Verify Python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Run lint
        run: uv run ruff check babygrad tests
      - name: Run typecheck
        run: uv run pyright
      - name: Run tests
        run: uv run pytest
